name: Publish to PyPI
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install unpublished member libs from git
        # Members not on PyPI yet — installed from git first so that
        # `pip install -e .` finds their requirement already satisfied.
        run: |
          pip install git+https://github.com/usestapel/stapel-core.git
          pip install git+https://github.com/usestapel/stapel-chat.git
          pip install git+https://github.com/usestapel/stapel-reviews.git

      - name: Install
        run: pip install -e ".[all]" || pip install -e .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import stapel_social; print('import OK')"

      - name: Install test dependencies
        run: pip install pytest pytest-django

      - name: Tests
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build --quiet
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
